// ─── UTILS ────────────────────────────────────────────────────────────────────
const hsh=s=>{let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i);return Math.abs(h);};
const ini=n=>n.split(" ").map(w=>w[0]||"").join("").toUpperCase().slice(0,2);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);

function Av({name,size=32}){
  const c=AV[hsh(name)%AV.length];
  return(
    <div style={{width:size,height:size,borderRadius:"50%",background:c.bg,color:c.t,
      display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:size*.36,fontWeight:700,flexShrink:0,
      border:"2px solid #fff",boxShadow:"0 1px 4px rgba(0,0,0,.14)",letterSpacing:"-.5px"}}>
      {ini(name)}
    </div>
  );
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function Auth({onLogin}){

      if(!proj){setErr("Please select a team.");return;}
      onLogin({project:proj,role:"sm",name:smName});return;
    }
    if(pw===PARTICIPANT_PASSWORD){
      if(!name.trim()){setErr("Please enter your name.");return;}
      if(!proj){setErr("Please select a team.");return;}
      onLogin({project:proj,role:"participant",name:name.trim()});return;

    setErr("Wrong access code. Try again.");

    setPw(v);

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",

            display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🔁</div>
          <div>
            <div style={{fontSize:20,fontWeight:800,color:"#0f172a"}}>RetroForge</div>
            <div style={{fontSize:12,color:"#94a3b8",fontWeight:500}}>Lexipol Sprint Retrospective</div>
          </div>
        </div>

        {/* Team grid */}
        <label style={FL}>Select your team</label>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:16}}>
          {Object.entries(PROJECTS).map(([k,v])=>(

        {/* Name — SM dropdown or free input */}
        {pw===SM_PASSWORD ? (
          <>
            <label style={FL}>Scrum Master</label>

// ─── RETRO LIST ───────────────────────────────────────────────────────────────
function RetroList({user,projectKey,onSelect,onBack}){
  const proj=PROJECTS[projectKey];
  const [retros,setRetros]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showCreate,setShowCreate]=useState(false);
  const [form,setForm]=useState({name:"",votes:3,columns:DEF_COLS.map(c=>({...c}))});

  useEffect(()=>{load();},[ ]);

  async function load(){
    setLoading(true);
    const {data}=await sb.from("retros").select("*").eq("project_key",projectKey).order("created_at",{ascending:false});
    setRetros(data||[]);setLoading(false);
  }

  async function create(){
    if(!form.name.trim())return;
    const r={id:uid(),project_key:projectKey,name:form.name.trim(),
      votes_per_person:parseInt(form.votes)||3,step:1,columns:form.columns,
      groups:[],action_items:{},ready_status:{},user_votes:{},group_votes:{}};
    const {error}=await sb.from("retros").insert(r);
    if(!error){setShowCreate(false);onSelect(r.id);}
    else alert("Error: "+error.message);
  }

  function addCol(){
    const newCol={id:uid(),label:"New Column",color:"#64748b"};
    setForm(f=>({...f,columns:[...f.columns,newCol]}));
  }
  function removeCol(id){setForm(f=>({...f,columns:f.columns.filter(c=>c.id!==id)}));}
  function upCol(id,field,val){setForm(f=>({...f,columns:f.columns.map(c=>c.id===id?{...c,[field]:val}:c)}));}

  if(loading)return <Loader msg="Loading retros..."/>;

  return(
    <div style={{padding:"32px 28px",maxWidth:760,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:24}}>
        <div>
          <button style={{...bGhost,padding:"5px 12px",fontSize:12,marginBottom:12}} onClick={onBack}>← Back</button>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:28}}>{proj.emoji}</span>
            <div>
              <div style={{fontSize:22,fontWeight:800,color:"#0f172a"}}>{proj.name}</div>
              <div style={{fontSize:13,color:"#94a3b8"}}>Retro history</div>
            </div>
          </div>
        </div>
        {user.role==="sm"&&(
          <button style={bPrimary} onClick={()=>setShowCreate(true)}>+ New Retro</button>
        )}
      </div>

      {retros.length===0&&(
        <div style={{background:"#f8fafc",borderRadius:12,padding:"32px",textAlign:"center",border:"1.5px dashed #e5e7eb"}}>
          <div style={{fontSize:28,marginBottom:10}}>📋</div>
          <div style={{fontSize:14,color:"#94a3b8"}}>
            {user.role==="sm"?"No retros yet. Create one above.":"No retros yet. Ask your SM to create one."}
          </div>
        </div>
      )}

      {retros.map(r=>{
        const stepLabels=["","Writing","Grouping","Voting","Action Items","Complete ✓"];
        const stepColors=["","#f59e0b","#8b5cf6","#0ea5e9","#0d9488","#16a34a"];
        return(
          <div key={r.id}
            style={{background:"#fff",border:"1.5px solid #e5e7eb",borderRadius:12,
              padding:"16px 20px",marginBottom:10,display:"flex",alignItems:"center",
              justifyContent:"space-between",cursor:"pointer",transition:"all .15s"}}
            onClick={()=>onSelect(r.id)}
            onMouseEnter={e=>{e.currentTarget.style.borderColor="#0ea5e9";e.currentTarget.style.boxShadow="0 2px 12px rgba(0,0,0,.06)";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="#e5e7eb";e.currentTarget.style.boxShadow="";}}>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:"#0f172a"}}>{r.name}</div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginTop:5}}>
                <span style={{fontSize:11,color:"#94a3b8"}}>
                  {new Date(r.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}
                </span>
                <span style={{background:stepColors[r.step]+"18",color:stepColors[r.step],
                  borderRadius:100,padding:"2px 9px",fontSize:11,fontWeight:700,border:`1px solid ${stepColors[r.step]}33`}}>
                  {stepLabels[r.step]}
                </span>
                <span style={{fontSize:11,color:"#94a3b8"}}>{r.votes_per_person} votes/person</span>
              </div>
            </div>
            <span style={{color:"#d1d5db",fontSize:20}}>→</span>
          </div>
        );
      })}

      {/* Create modal */}
      {showCreate&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.4)",
          backdropFilter:"blur(4px)",zIndex:300,display:"flex",alignItems:"center",
          justifyContent:"center",padding:24}}>
          <div style={{background:"#fff",borderRadius:16,padding:28,width:"100%",
            maxWidth:500,boxShadow:"0 24px 64px rgba(0,0,0,.15)",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{fontSize:18,fontWeight:800,color:"#0f172a",marginBottom:20}}>New Retrospective</div>

            <label style={FL}>Sprint Name</label>
            <input style={FI} placeholder="e.g. Sprint 42 · March 2026"
              value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} autoFocus/>

            <label style={FL}>Votes per person</label>
            <input style={FI} type="number" min={1} max={20}
              value={form.votes} onChange={e=>setForm(f=>({...f,votes:e.target.value}))}/>

            <label style={FL}>Columns</label>
            {form.columns.map(col=>(
              <div key={col.id} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                <input type="color" value={col.color} onChange={e=>upCol(col.id,"color",e.target.value)}
                  style={{width:32,height:32,border:"none",borderRadius:8,cursor:"pointer",
                    padding:3,flexShrink:0,background:"transparent"}}/>
                <input style={{...FI,marginBottom:0,flex:1}} value={col.label}
                  onChange={e=>upCol(col.id,"label",e.target.value)}/>
                {form.columns.length>1&&(
                  <button onClick={()=>removeCol(col.id)}
                    style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:7,
                      width:32,height:32,cursor:"pointer",fontSize:16,flexShrink:0,display:"flex",
                      alignItems:"center",justifyContent:"center"}}>×</button>
                )}
              </div>
            ))}
            <button onClick={addCol}
              style={{...bGhost,fontSize:12,padding:"6px 14px",marginBottom:16}}>
              + Add column
            </button>

            <div style={{display:"flex",gap:8,marginTop:8}}>
              <button style={bPrimary} onClick={create}>Create Retro</button>
              <button style={bGhost} onClick={()=>setShowCreate(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── BOARD ────────────────────────────────────────────────────────────────────
function Board({user,projectKey,retroId,onBack}){
  const [retro,setRetro]=useState(null);
  const [cards,setCards]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [aiLoading,setAiLoading]=useState(false);
  const [aiSug,setAiSug]=useState(null);
  const [drafts,setDrafts]=useState({});
  const [topicIdx,setTopicIdx]=useState(0);
  const [actDraft,setActDraft]=useState("");
  const [expanded,setExpanded]=useState({});
  const dragCard=useRef(null);
  const [dragOverCard,setDragOverCard]=useState(null);
  const [dragOverGroup,setDragOverGroup]=useState(null);

  useEffect(()=>{
    loadAll();
    const retroSub=sb.channel(`retro-${retroId}`)
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"retros",filter:`id=eq.${retroId}`},
        p=>{setRetro(p.new);}).subscribe();
    const cardsSub=sb.channel(`cards-${retroId}`)
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"cards",filter:`retro_id=eq.${retroId}`},
        p=>{setCards(prev=>prev.find(c=>c.id===p.new.id)?prev:[...prev,p.new]);})
      .on("postgres_changes",{event:"DELETE",schema:"public",table:"cards",filter:`retro_id=eq.${retroId}`},
        p=>{setCards(prev=>prev.filter(c=>c.id!==p.old.id));}).subscribe();
    return()=>{sb.removeChannel(retroSub);sb.removeChannel(cardsSub);};
  },[retroId]);

  async function loadAll(){
    setLoading(true);
    const [{data:rd},{data:cd}]=await Promise.all([
      sb.from("retros").select("*").eq("id",retroId).single(),
      sb.from("cards").select("*").eq("retro_id",retroId).order("created_at",{ascending:true}),
    ]);
    setRetro(rd||null);setCards(cd||[]);setLoading(false);
  }

  async function saveRetro(updates){
    setSaving(true);
    const {error}=await sb.from("retros").update(updates).eq("id",retroId);
    if(!error)setRetro(r=>({...r,...updates}));
    setSaving(false);
  }

  async function addCard(colId){
    const text=(drafts[colId]||"").trim();if(!text)return;
    const card={id:uid(),retro_id:retroId,col_id:colId,text,author:user.name};
    setDrafts(d=>({...d,[colId]:""}));
    await sb.from("cards").insert(card);
  }

  async function toggleReady(){
    const rs={...(retro.ready_status||{})};
    rs[user.name]=!rs[user.name];
    await saveRetro({ready_status:rs});
  }

  // ── Drag & Drop ────────────────────────────────────────────────────────────
  function onDragStart(e,card){dragCard.current=card;e.dataTransfer.effectAllowed="move";}
  function onDragEnd(){dragCard.current=null;setDragOverCard(null);setDragOverGroup(null);}

  function onCardDragOver(e,tc){
    e.preventDefault();e.stopPropagation();
    if(!dragCard.current||dragCard.current.id===tc.id||dragCard.current.col_id!==tc.col_id)return;
    setDragOverCard(tc.id);setDragOverGroup(null);
  }
  function onGroupDragOver(e,gid){
    e.preventDefault();e.stopPropagation();
    if(!dragCard.current)return;
    setDragOverGroup(gid);setDragOverCard(null);
  }
  async function onCardDrop(e,tc){
    e.preventDefault();e.stopPropagation();
    setDragOverCard(null);setDragOverGroup(null);
    const src=dragCard.current;dragCard.current=null;
    if(!src||src.id===tc.id||src.col_id!==tc.col_id)return;
    let groups=[...(retro.groups||[])];
    const srcG=groups.find(g=>g.cardIds.includes(src.id));
    const tgtG=groups.find(g=>g.cardIds.includes(tc.id));
    if(srcG&&tgtG&&srcG.id===tgtG.id)return;
    if(tgtG){
      if(srcG)groups=groups.map(g=>g.id===srcG.id?{...g,cardIds:g.cardIds.filter(id=>id!==src.id)}:g);
      groups=groups.map(g=>g.id===tgtG.id?{...g,cardIds:[...g.cardIds,src.id]}:g);
    } else if(srcG){
      groups=groups.map(g=>g.id===srcG.id?{...g,cardIds:[...g.cardIds,tc.id]}:g);
    } else {
      const ng={id:uid(),name:"New Group",cardIds:[src.id,tc.id]};
      groups=[...groups,ng];
      setExpanded(ex=>({...ex,[ng.id]:true}));
    }
    await saveRetro({groups:groups.filter(g=>g.cardIds.length>0)});
  }
  async function onGroupDrop(e,gid){
    e.preventDefault();e.stopPropagation();
    setDragOverCard(null);setDragOverGroup(null);
    const src=dragCard.current;dragCard.current=null;
    if(!src)return;
    let groups=[...(retro.groups||[])];
    const srcG=groups.find(g=>g.cardIds.includes(src.id));
    if(srcG&&srcG.id===gid)return;
    if(srcG)groups=groups.map(g=>g.id===srcG.id?{...g,cardIds:g.cardIds.filter(id=>id!==src.id)}:g);
    groups=groups.map(g=>g.id===gid?{...g,cardIds:[...g.cardIds,src.id]}:g);
    await saveRetro({groups:groups.filter(g=>g.cardIds.length>0)});
  }
  async function ungroupCard(cardId){
    const groups=(retro.groups||[]).map(g=>({...g,cardIds:g.cardIds.filter(id=>id!==cardId)})).filter(g=>g.cardIds.length>0);
    await saveRetro({groups});
  }

  // ── AI Grouping ────────────────────────────────────────────────────────────
  async function runGrouping(){
    setAiLoading(true);
    await saveRetro({step:2,ready_status:{}});
    const cs=cards.map(c=>({id:c.id,text:c.text}));
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
          system:"You are an agile coach. Return ONLY valid JSON.",
          messages:[{role:"user",content:`Group these retro cards into 3-6 thematic clusters.\nCards:${JSON.stringify(cs)}\nReturn ONLY JSON:{"groups":[{"name":"Group Name","cardIds":["id1"]}]}`}]})});
      const d=await res.json();
      const p=JSON.parse((d.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim());
      setAiSug(p.groups||[]);
    }catch{setAiSug([]);}
    setAiLoading(false);
  }

  async function acceptGroups(){
    const groups=aiSug.map(g=>({...g,id:uid()}));
    const ex={};groups.forEach(g=>{ex[g.id]=true;});setExpanded(ex);
    await saveRetro({groups});setAiSug(null);
  }

  // ── Voting ─────────────────────────────────────────────────────────────────
  const vUsed=()=>Object.values((retro?.user_votes||{})[user.name]||{}).reduce((a,b)=>a+b,0);
  const vLeft=()=>(retro?.votes_per_person||3)-vUsed();

  async function voteItem(id,delta){
    const vl=vLeft();
    const uv={...(retro.user_votes||{})};
    const myV={...(uv[user.name]||{})};
    const cur=myV[id]||0;
    if(delta>0&&vl<=0)return;
    myV[id]=Math.max(0,cur+delta);uv[user.name]=myV;
    const gv={...(retro.group_votes||{})};
    gv[id]=Object.values(uv).reduce((s,mv)=>s+(mv[id]||0),0);
    await saveRetro({user_votes:uv,group_votes:gv});
  }

  // ── Topics ─────────────────────────────────────────────────────────────────
  const allTopics=()=>{
    if(!retro)return[];
    const gv=retro.group_votes||{};
    const grouped=new Set((retro.groups||[]).flatMap(g=>g.cardIds));
    const items=[];
    (retro.groups||[]).forEach(g=>{
      items.push({type:"group",id:g.id,name:g.name,votes:gv[g.id]||0,cards:cards.filter(c=>g.cardIds.includes(c.id))});
    });
    cards.filter(c=>!grouped.has(c.id)).forEach(c=>{
      items.push({type:"card",id:c.id,name:c.text,votes:gv[c.id]||0,cards:[c]});
    });
    return items.sort((a,b)=>b.votes-a.votes);
  };

  async function addAction(){
    if(!actDraft.trim())return;
    const topics=allTopics();const t=topics[topicIdx];if(!t)return;
    const ai2={...(retro.action_items||{})};
    ai2[t.id]=[...(ai2[t.id]||[]),{id:uid(),text:actDraft.trim()}];
    await saveRetro({action_items:ai2});setActDraft("");
  }
  async function removeAction(tid,itemId){
    const ai2={...(retro.action_items||{})};
    ai2[tid]=(ai2[tid]||[]).filter(x=>x.id!==itemId);
    await saveRetro({action_items:ai2});
  }

  async function advance(){
    if(!retro||retro.step>=5)return;
    if(retro.step===1){await runGrouping();return;}
    await saveRetro({step:retro.step+1,ready_status:{}});
  }
  async function goBack(){
    if(!retro||retro.step<=1)return;
    await saveRetro({step:retro.step-1,ready_status:{}});
  }

  if(loading)return <Loader msg="Loading session..."/>;

  const readyNames=Object.entries(retro.ready_status||{}).filter(([,v])=>v).map(([k])=>k);
  const isReady=!!retro.ready_status?.[user.name];
  const vl=vLeft();
  const knownPeople=Array.from(new Set([user.name,...cards.map(c=>c.author)]));
  const colColor=colId=>(retro.columns.find(c=>c.id===colId)||{color:"#94a3b8"}).color;
  const STEP_LABELS=["","Share your thoughts.","Review & group cards.","Vote to prioritize.","Create action items.","Session complete!"];

  // ── Card Step 1 ────────────────────────────────────────────────────────────

  // ── Card Step 2 (draggable) ────────────────────────────────────────────────

        {allActions.length===0?(

                    <div style={{flex:1}}>

                              {t.type==="group"?"Group":"Ticket"}

                            </span>
                          </div>
                          <div style={{fontSize:13,color:"#374151",fontWeight:600}}>{t.name}</div>
                          {t.type==="group"&&t.cards.length>1&&(
                            <div style={{display:"flex",gap:5,marginTop:7,flexWrap:"wrap"}}>
                              {t.cards.map(c=>(
                                <div key={c.id} style={{display:"flex",alignItems:"center",gap:4,
                                  background:"#fff",border:"1px solid #e5e7eb",borderRadius:7,
                                  padding:"2px 8px",fontSize:11}}>
                                  <Av name={c.author} size={14}/>
                                  <span style={{color:"#64748b"}}>{c.text.slice(0,30)}{c.text.length>30?"…":""}</span>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </>
        )}
      </div>
    );
  };

  // ── RENDER ─────────────────────────────────────────────────────────────────
  const proj=PROJECTS[projectKey];
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>

      {/* Topbar */}
      <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",height:52,
        display:"flex",alignItems:"center",padding:"0 20px",gap:10,flexShrink:0,
        boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
        <button style={{...bGhost,padding:"4px 10px",fontSize:11}} onClick={onBack}>← Back</button>
        <span style={{color:"#e5e7eb"}}>|</span>
        <span style={{fontSize:16}}>{proj.emoji}</span>
        <span style={{fontSize:14,fontWeight:800,color:"#0f172a"}}>{proj.name}</span>

        <span style={{fontSize:13,color:"#64748b",fontWeight:500,overflow:"hidden",
          textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{retro.name}</span>
        {saving&&<span style={{fontSize:11,color:"#94a3b8",marginLeft:4}}>saving…</span>}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          {user.role==="sm"&&(
            <span style={{background:"#eef2ff",color:"#4338ca",border:"1px solid #c7d2fe",
              borderRadius:100,padding:"2px 10px",fontSize:11,fontWeight:700}}>SM</span>
          )}
          <Av name={user.name} size={28}/>

        </div>

      {/* Color bar */}
      <div style={{display:"flex",height:4,flexShrink:0}}>
        {retro.columns.map(c=><div key={c.id} style={{flex:1,background:c.color}}/>)}
      </div>

      <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",height:50,

          {/* Step pills */}
          {["Write","Group","Vote","Actions"].map((label,i)=>{

            const done=retro.step>s;
            return(
              <div key={s} style={{display:"flex",alignItems:"center",gap:6}}>
                {i>0&&<span style={{color:"#d1d5db",fontSize:12}}>›</span>}
                <div style={{display:"flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:100,
                  background:active?"#0ea5e9":done?"#dcfce7":"#f1f5f9",
                  border:`1px solid ${active?"#0ea5e9":done?"#16a34a":"#e5e7eb"}`}}>
                  <span style={{fontSize:11,fontWeight:700,
                    color:active?"#fff":done?"#16a34a":"#94a3b8"}}>

              <div style={{width:42,height:24,borderRadius:100,

                <div style={{position:"absolute",top:3,left:isReady?21:3,width:18,height:18,
                  borderRadius:"50%",background:"#fff",
                  boxShadow:"0 1px 4px rgba(0,0,0,.2)",transition:"left .2s"}}/>

            </div>
          )}

          {/* ── STEP 2: Group ── */}
          {retro.step===2&&(
            <div style={{display:"flex",height:"100%"}}>
              {aiSug&&(
                <div style={{position:"absolute",top:0,left:0,right:185,zIndex:10}}>
                  <div style={{background:"#eef2ff",border:"1.5px solid #c7d2fe",borderRadius:12,
                    padding:"14px 18px",margin:"12px 16px",boxShadow:"0 4px 16px rgba(99,102,241,.15)"}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#4338ca",marginBottom:12}}>
                      ✦ AI suggested {aiSug.length} groups — review and accept
                    </div>
                    {aiSug.map((g,i)=>{
                      const gc=cards.filter(c=>g.cardIds.includes(c.id));
                      return(
                        <div key={i} style={{background:"#fff",border:"1px solid #e0e7ff",
                          borderRadius:9,padding:"10px 14px",marginBottom:8}}>
                          <div style={{fontSize:13,fontWeight:700,color:"#312e81",marginBottom:6}}>🗂 {g.name}</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                            {gc.map(c=>(
                              <span key={c.id} style={{background:"#f0f4ff",border:"1px solid #e0e7ff",
                                borderRadius:7,padding:"2px 9px",fontSize:11,color:"#4338ca"}}>
                                {c.text.slice(0,35)}{c.text.length>35?"…":""}
                              </span>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                    <div style={{display:"flex",gap:8,marginTop:12}}>
                      <button style={bSuccess} onClick={acceptGroups}>✓ Accept Groups</button>
                      <button style={bGhost} onClick={()=>setAiSug(null)}>Dismiss</button>
                    </div>
                  </div>
                </div>
              )}
              {retro.columns.map(col=>{
                const freeCards=cards.filter(c=>c.col_id===col.id&&!(retro.groups||[]).some(g=>g.cardIds.includes(c.id)));
                const colGroups=(retro.groups||[]).filter(g=>cards.some(c=>g.cardIds.includes(c.id)&&c.col_id===col.id));
                return(
                  <div key={col.id} style={{flex:1,borderRight:"1px solid #f1f5f9",
                    display:"flex",flexDirection:"column",minWidth:270,background:"#fafafa"}}>
                    <div style={{padding:"14px 16px 8px",borderBottom:"2px solid "+col.color+"44",background:"#fff"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:10,height:10,borderRadius:"50%",background:col.color}}/>
                        <div style={{fontSize:15,fontWeight:700,color:"#0f172a"}}>{col.label}</div>
                      </div>
                      <div style={{fontSize:10,color:"#94a3b8",fontWeight:600,marginTop:6,letterSpacing:".5px"}}>
                        DRAG CARDS ONTO EACH OTHER TO GROUP
                      </div>
                    </div>
                    <div style={{flex:1,padding:"10px 10px 16px",overflowY:"auto"}}>
                      {colGroups.map(g=>{
                        const gc=cards.filter(c=>g.cardIds.includes(c.id)&&c.col_id===col.id);
                        const isExp=expanded[g.id]!==false;
                        const isOvG=dragOverGroup===g.id;
                        return(
                          <div key={g.id}
                            onDragOver={e=>onGroupDragOver(e,g.id)}
                            onDragLeave={()=>setDragOverGroup(null)}
                            onDrop={e=>onGroupDrop(e,g.id)}
                            style={{background:isOvG?"#eff6ff":"#fff",
                              border:`1.5px solid ${isOvG?"#3b82f6":"#e5e7eb"}`,
                              borderRadius:10,marginBottom:10,transition:"all .12s",
                              boxShadow:isOvG?"0 0 0 3px rgba(59,130,246,.15)":"0 1px 3px rgba(0,0,0,.04)"}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,
                              padding:"8px 12px",borderBottom:isExp?"1px solid #f1f5f9":"none"}}>
                              <span style={{fontSize:14}}>🗂</span>
                              <input style={{flex:1,border:"none",background:"transparent",
                                fontSize:13,fontWeight:700,color:"#0f172a",outline:"none"}}
                                value={g.name}
                                onChange={e=>{const groups=retro.groups.map(x=>x.id===g.id?{...x,name:e.target.value}:x);saveRetro({groups});}}/>
                              <span style={{fontSize:11,color:"#94a3b8",fontWeight:600,
                                background:"#f1f5f9",borderRadius:100,padding:"1px 7px"}}>{gc.length}</span>
                              <button style={{background:"none",border:"none",cursor:"pointer",
                                color:"#94a3b8",fontSize:13,padding:"2px 4px"}}
                                onClick={()=>setExpanded(ex=>({...ex,[g.id]:!isExp}))}>
                                {isExp?"▲":"▼"}
                              </button>
                            </div>
                            {isExp&&(
                              <div style={{padding:"8px"}}>
                                {gc.map(card=><Card2 key={card.id} card={card} inGroup/>)}
                                {gc.length===0&&(
                                  <div style={{fontSize:11,color:"#94a3b8",textAlign:"center",padding:"10px 0"}}>
                                    Drop cards here
                                  </div>
                                )}
                              </div>
                            )}
                          </div>
                        );
                      })}
                      {freeCards.map(card=><Card2 key={card.id} card={card}/>)}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* ── STEP 3: Vote ── */}
          {retro.step===3&&(
            <div style={{display:"flex",height:"100%"}}>
              {retro.columns.map(col=>{
                const colG=(retro.groups||[]).filter(g=>cards.some(c=>g.cardIds.includes(c.id)&&c.col_id===col.id));
                const freeC=cards.filter(c=>c.col_id===col.id&&!(retro.groups||[]).some(g=>g.cardIds.includes(c.id)));
                return(
                  <div key={col.id} style={{flex:1,borderRight:"1px solid #f1f5f9",
                    display:"flex",flexDirection:"column",minWidth:260,background:"#fafafa"}}>
                    <div style={{padding:"14px 16px 10px",borderBottom:"2px solid "+col.color+"44",background:"#fff"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:10,height:10,borderRadius:"50%",background:col.color}}/>
                        <div style={{fontSize:15,fontWeight:700,color:"#0f172a"}}>{col.label}</div>
                      </div>
                    </div>
                    <div style={{flex:1,padding:"10px",overflowY:"auto"}}>
                      {freeC.map(card=>(
                        <div key={card.id} style={{background:"#fff",border:"1.5px solid #e5e7eb",
                          borderRadius:10,padding:"12px 14px",marginBottom:8,
                          boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
                          <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10}}>
                            <div style={{width:4,borderRadius:4,background:col.color,alignSelf:"stretch",minHeight:28,flexShrink:0}}/>
                            <Av name={card.author} size={24}/>
                            <div style={{flex:1}}>
                              <div style={{fontSize:13,fontWeight:600,color:"#0f172a",lineHeight:1.5}}>{card.text}</div>
                              <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{card.author}</div>
                            </div>
                          </div>
                          <div style={{display:"flex",justifyContent:"flex-end"}}>
                            <VoteBtn id={card.id}/>
                          </div>
                        </div>
                      ))}
                      {colG.map(g=>{
                        const gc=cards.filter(c=>g.cardIds.includes(c.id)&&c.col_id===col.id);
                        const isExp=expanded[g.id]!==false;
                        return(
                          <div key={g.id} style={{background:"#fff",border:"1.5px solid #e5e7eb",
                            borderRadius:10,marginBottom:8,overflow:"hidden",
                            boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
                            <div style={{display:"flex",alignItems:"center",
                              justifyContent:"space-between",padding:"10px 14px",
                              borderBottom:isExp?"1px solid #f1f5f9":"none"}}>
                              <div style={{display:"flex",alignItems:"center",gap:8}}>
                                <span style={{fontSize:14}}>🗂</span>
                                <span style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{g.name}</span>
                                <span style={{fontSize:11,color:"#94a3b8",background:"#f1f5f9",
                                  borderRadius:100,padding:"1px 7px",fontWeight:600}}>{gc.length}</span>
                              </div>
                              <div style={{display:"flex",alignItems:"center",gap:6}}>
                                <VoteBtn id={g.id} isGroup/>
                                <button style={{background:"none",border:"none",cursor:"pointer",
                                  color:"#94a3b8",fontSize:12,padding:"2px 4px"}}
                                  onClick={()=>setExpanded(ex=>({...ex,[g.id]:!isExp}))}>
                                  {isExp?"▲":"▼"}
                                </button>
                              </div>
                            </div>
                            {isExp&&(
                              <div style={{padding:"8px 12px"}}>
                                {gc.map(card=>(
                                  <div key={card.id} style={{background:"#f8fafc",borderRadius:7,
                                    padding:"7px 10px",marginBottom:5,display:"flex",
                                    alignItems:"center",gap:8,fontSize:12}}>
                                    <div style={{width:3,borderRadius:3,background:col.color,
                                      alignSelf:"stretch",minHeight:18,flexShrink:0}}/>
                                    <Av name={card.author} size={18}/>
                                    <span style={{color:"#374151",fontWeight:500}}>{card.text}</span>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* ── STEP 4: Action Items ── */}
          {retro.step===4&&(()=>{
            const topics=allTopics();
            if(topics.length===0)return(
              <div style={{padding:48,textAlign:"center",color:"#94a3b8"}}>
                <div style={{fontSize:36,marginBottom:12}}>🗳️</div>
                <div style={{fontSize:15,fontWeight:600}}>No cards found. Go back and add some first.</div>
              </div>
            );
            const t=topics[Math.min(topicIdx,topics.length-1)];
            const items=(retro.action_items||{})[t.id]||[];
            const fc=t.cards[0];
            return(
              <div style={{display:"flex",height:"100%"}}>
                {/* Left panel */}
                <div style={{width:300,flexShrink:0,borderRight:"1px solid #e5e7eb",
                  padding:22,overflowY:"auto",background:"#fafafa"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:18}}>
                    <button style={{...bGhost,padding:"3px 10px",fontSize:11}}
                      onClick={()=>setTopicIdx(i=>Math.max(0,i-1))} disabled={topicIdx===0}>‹</button>
                    <span style={{fontSize:12,fontWeight:700,color:"#6b7280",flex:1,textAlign:"center"}}>
                      Topic ({Math.min(topicIdx,topics.length-1)+1}/{topics.length})
                    </span>
                    <button style={{...bGhost,padding:"3px 10px",fontSize:11}}
                      onClick={()=>setTopicIdx(i=>Math.min(topics.length-1,i+1))} disabled={topicIdx>=topics.length-1}>›</button>
                  </div>
                  <div style={{fontSize:18,fontWeight:800,color:"#0f172a",marginBottom:8,lineHeight:1.3}}>{t.name}</div>
                  <div style={{display:"inline-flex",alignItems:"center",gap:5,background:"#dcfce7",
                    color:"#16a34a",borderRadius:100,padding:"4px 12px",fontSize:12,fontWeight:700,marginBottom:18}}>
                    👍 {t.votes} vote{t.votes!==1?"s":""}
                  </div>
                  {t.type==="group"&&t.cards.map(card=>(
                    <div key={card.id} style={{background:"#fff",borderRadius:8,padding:"8px 10px",
                      marginBottom:6,display:"flex",alignItems:"center",gap:8,fontSize:12,
                      border:"1px solid #e5e7eb"}}>
                      <div style={{width:3,borderRadius:3,background:colColor(card.col_id),
                        alignSelf:"stretch",minHeight:18,flexShrink:0}}/>
                      <Av name={card.author} size={18}/>
                      <span style={{color:"#374151",fontWeight:500}}>{card.text}</span>
                    </div>
                  ))}
                  {/* All topics list */}
                  <div style={{marginTop:20,paddingTop:16,borderTop:"1px solid #e5e7eb"}}>
                    <div style={{fontSize:10,fontWeight:700,letterSpacing:"1.5px",
                      textTransform:"uppercase",color:"#94a3b8",marginBottom:10}}>All Topics</div>
                    {topics.map((tp,i)=>(
                      <div key={tp.id} onClick={()=>setTopicIdx(i)}
                        style={{display:"flex",alignItems:"center",gap:7,padding:"6px 8px",
                          borderRadius:8,marginBottom:3,cursor:"pointer",
                          background:i===Math.min(topicIdx,topics.length-1)?"#e0f2fe":"transparent",
                          transition:"background .12s"}}>
                        <span style={{fontSize:11,fontWeight:700,color:"#0ea5e9",minWidth:28}}>👍{tp.votes}</span>
                        <span style={{fontSize:12,color:"#374151",flex:1,overflow:"hidden",
                          textOverflow:"ellipsis",whiteSpace:"nowrap",
                          fontWeight:i===topicIdx?700:400}}>{tp.name}</span>
                        <span style={{fontSize:10,color:"#94a3b8",flexShrink:0}}>
                          {((retro.action_items||{})[tp.id]||[]).length}✓
                        </span>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Right panel */}
                <div style={{flex:1,display:"flex",flexDirection:"column",
                  alignItems:"center",padding:"40px 28px",overflowY:"auto"}}>
                  <div style={{fontSize:60,fontWeight:800,color:"#0ea5e9",lineHeight:1,marginBottom:4}}>{items.length}</div>
                  <div style={{fontSize:16,fontWeight:600,color:"#6b7280",marginBottom:8}}>Action Items</div>
                  {/* Topic context */}
                  <div style={{background:"#f8fafc",border:"1.5px solid #e5e7eb",borderRadius:10,
                    padding:"10px 16px",marginBottom:24,width:"100%",maxWidth:540,
                    display:"flex",alignItems:"center",gap:10}}>
                    {fc&&<><div style={{width:3,borderRadius:3,background:colColor(fc.col_id),
                      alignSelf:"stretch",minHeight:20,flexShrink:0}}/>
                    <Av name={fc.author} size={24}/></>}
                    <div style={{flex:1}}>
                      <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,marginBottom:2,
                        textTransform:"uppercase",letterSpacing:"1px"}}>
                        Current Topic · 👍 {t.votes} votes
                      </div>
                      <div style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{t.name}</div>
                    </div>
                  </div>
                  <input
                    style={{width:"100%",maxWidth:540,border:"none",
                      borderBottom:"2px solid #e5e7eb",padding:"10px 0",fontSize:14,
                      color:"#0f172a",background:"transparent",outline:"none"}}
                    placeholder="+ Type your idea here and hit enter"
                    value={actDraft} onChange={e=>setActDraft(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addAction();}}}
                    onFocus={e=>e.target.style.borderBottomColor="#0ea5e9"}
                    onBlur={e=>e.target.style.borderBottomColor="#e5e7eb"}/>
                  {items.map(item=>(
                    <div key={item.id} style={{width:"100%",maxWidth:540,background:"#fff",
                      border:"1.5px solid #e5e7eb",borderRadius:10,padding:"12px 16px",marginTop:10,
                      display:"flex",alignItems:"flex-start",gap:10,
                      boxShadow:"0 1px 4px rgba(0,0,0,.05)",animation:"fadeIn .2s ease"}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:600,color:"#0f172a",marginBottom:5}}>{item.text}</div>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          {fc&&<Av name={fc.author} size={16}/>}
                          <span style={{fontSize:11,color:"#94a3b8"}}>
                            from: {t.name.slice(0,40)}{t.name.length>40?"…":""} · 👍{t.votes}
                          </span>
                        </div>
                      </div>
                      <button style={{background:"none",border:"none",cursor:"pointer",
                        color:"#d1d5db",fontSize:18,padding:"0 4px",flexShrink:0,lineHeight:1}}
                        onClick={()=>removeAction(t.id,item.id)}
                        onMouseEnter={e=>e.target.style.color="#ef4444"}
                        onMouseLeave={e=>e.target.style.color="#d1d5db"}>×</button>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}

          {/* ── STEP 5: Summary ── */}
          {retro.step===5&&<Summary/>}
        </div>

        {/* Sidebar */}
        {retro.step<5&&(
          <div style={{width:190,flexShrink:0,background:"#fff",
            borderLeft:"1px solid #e5e7eb",padding:"18px 16px",overflowY:"auto"}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:"1.5px",
              textTransform:"uppercase",color:"#94a3b8",marginBottom:14}}>Members Ready</div>
            {knownPeople.map(name=>(
              <div key={name} style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <div style={{position:"relative"}}>
                  <Av name={name} size={30}/>
                  {readyNames.includes(name)&&(
                    <div style={{position:"absolute",bottom:-2,right:-2,width:12,height:12,
                      borderRadius:"50%",background:"#22c55e",border:"2px solid #fff",
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:7}}>✓</div>
                  )}
                </div>
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:"#0f172a"}}>
                    {name}{name===user.name?" (you)":""}
                  </div>
                  <div style={{fontSize:10,color:readyNames.includes(name)?"#16a34a":"#94a3b8",fontWeight:600}}>
                    {readyNames.includes(name)?"✓ Ready":"Thinking…"}
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [view,setView]=useState("dashboard");
  const [selProject,setSelProject]=useState(null);
  const [selRetro,setSelRetro]=useState(null);

  if(!user)return <Auth onLogin={u=>{setUser(u);setSelProject(u.project);setView("retrolist");}}/>;

  const proj=PROJECTS[selProject];

  const Topbar=()=>(
    <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",height:52,
      display:"flex",alignItems:"center",padding:"0 24px",gap:12,
      boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:32,height:32,borderRadius:8,
          background:"linear-gradient(135deg,#0ea5e9,#0d9488)",
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🔁</div>
        <span style={{fontSize:14,fontWeight:800,color:"#0f172a"}}>RetroForge</span>
      </div>
      {selProject&&(
        <span style={{background:proj.color+"18",color:proj.color,
          border:`1px solid ${proj.color}33`,borderRadius:100,
          padding:"2px 10px",fontSize:11,fontWeight:700}}>
          {proj.emoji} {proj.name}
        </span>
      )}
      <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
        <Av name={user.name} size={28}/>
        <span style={{fontSize:13,fontWeight:600,color:"#374151"}}>{user.name}</span>
        <button style={{...bGhost,padding:"5px 12px",fontSize:12}} onClick={()=>setUser(null)}>Logout</button>
      </div>
    </div>
  );

  if(view==="board"&&selRetro)return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <Board user={user} projectKey={selProject} retroId={selRetro} onBack={()=>setView("retrolist")}/>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"#f4f6f8"}}>
      <Topbar/>
      {view==="dashboard"&&<Dashboard user={user} onSelect={k=>{setSelProject(k);setView("retrolist");}}/>}
      {view==="retrolist"&&(
        <RetroList user={user} projectKey={selProject}
          onSelect={id=>{setSelRetro(id);setView("board");}}
          onBack={()=>setView("dashboard")}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
