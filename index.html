<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lexipol · Sprint Retrospective Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Barlow',system-ui,sans-serif;background:#f0f4f8;overflow:hidden;}
    @keyframes dot{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
    @keyframes revealCard{from{filter:blur(8px);opacity:.5}to{filter:blur(0);opacity:1}}
    input,select,button,textarea{font-family:'Barlow',system-ui,sans-serif;}

</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="text/babel">

const SUPABASE_URL="https://dzsrglsturkewnogiczq.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6c3JnbHN0dXJrZXdub2dpY3pxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU4MDIsImV4cCI6MjA4OTg2MTgwMn0.QbnPrKVkbbTJLd5XiZkfpb7SbROjgb4rBprihZhsxCk";

// ─── BRAND ────────────────────────────────────────────────────────────────────
const BRAND={
  navy:"#0a1f44",
  blue:"#1e5fa8",
  blueLight:"#2d7dd2",
  gold:"#f5a623",
  goldDark:"#d4891a",
  white:"#ffffff",
  gray50:"#f8fafc",
  gray100:"#f0f4f8",
  gray200:"#e2e8f0",
  gray300:"#cbd5e1",
  gray500:"#64748b",
  gray700:"#334155",
  gray900:"#0f172a",
  success:"#16a34a",
  danger:"#dc2626",
};

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const PARTICIPANT_PASSWORD="LEXIPOL";
const SM_PASSWORD="LEXIPOLSM";

const PROJECTS={
  shield:    {name:"Shield",    emoji:"🛡️", color:"#1e5fa8"},
  vanguard:  {name:"Vanguard",  emoji:"⚔️", color:"#ea580c"},
  valhalla:  {name:"Valhalla",  emoji:"🏔️", color:"#7c3aed"},
  argo:      {name:"Argo",      emoji:"⚓", color:"#0891b2"},
  golem:     {name:"Golem",     emoji:"🗿", color:"#78716c"},
  omag:      {name:"OMAG",      emoji:"🔭", color:"#4f46e5"},
  hydra:     {name:"Hydra",     emoji:"🐉", color:"#16a34a"},
  prometheus:{name:"Prometheus",emoji:"🔥", color:"#dc2626"},
  gato:      {name:"Gato",      emoji:"🐱", color:"#d97706"},
  condor:    {name:"Condor",    emoji:"🦅", color:"#0f766e"},
};

const SCRUM_MASTERS=["Codi Saad","Colleen Willoughby","Isabel Mosquera","Jonathan Silva","Larissa Nichols","Michael Ebbs","Paulina Camacho","Sebastian Spiguel"];

const DEF_COLS=[
  {id:"went-well",label:"What went well?",    color:"#16a34a"},
  {id:"improve",  label:"What didn't go well?",color:"#dc2626"},
  {id:"kudos",    label:"Kudos 🎉",             color:"#d97706"},
];

const AV=[
  {bg:"#dbeafe",t:"#1e40af"},{bg:"#fce7f3",t:"#9d174d"},
  {bg:"#dcfce7",t:"#166534"},{bg:"#fef3c7",t:"#92400e"},
  {bg:"#ede9fe",t:"#5b21b6"},{bg:"#ffedd5",t:"#9a3412"},
  {bg:"#cffafe",t:"#155e75"},{bg:"#fef9c3",t:"#713f12"},
  {bg:"#fce7f3",t:"#be185d"},{bg:"#ecfdf5",t:"#065f46"},
];

const hsh=s=>{let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i);return Math.abs(h);};
const ini=n=>n.split(" ").map(w=>w[0]||"").join("").toUpperCase().slice(0,2);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);

function Av({name,size=32}){
  const c=AV[hsh(name)%AV.length];
  return <div style={{width:size,height:size,borderRadius:"50%",background:c.bg,color:c.t,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.36,fontWeight:700,flexShrink:0,border:"2px solid #fff",boxShadow:"0 1px 4px rgba(0,0,0,.14)",letterSpacing:"-.5px"}}>{ini(name)}</div>;
}

function Spin(){
  return <span style={{display:"inline-flex",gap:3,alignItems:"center"}}>{[0,1,2].map(i=><span key={i} style={{width:5,height:5,borderRadius:"50%",background:BRAND.gold,display:"inline-block",animation:"dot .8s infinite",animationDelay:`${i*.15}s`}}/>)}</span>;
}

function PageLoader({msg="Loading..."}){
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:BRAND.navy,gap:16}}>
      <Spin/>
      <div style={{fontSize:14,color:"rgba(255,255,255,.6)",fontWeight:500}}>{msg}</div>
    </div>
  );
}

// ─── LEXIPOL LOGO SVG ─────────────────────────────────────────────────────────
function LexipolLogo({size=32,white=false}){
  const c=white?"#fff":BRAND.navy;
  return(
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="6" fill={white?BRAND.gold:BRAND.navy}/>
        <path d="M8 8h6v18h12v6H8V8z" fill={white?BRAND.navy:BRAND.gold}/>
        <path d="M20 8h12l-6 12h6l-12 12V20h-6L20 8z" fill={white?"#fff":BRAND.blueLight} opacity=".9"/>
      </svg>
      <div>
        <div style={{fontSize:size*.55,fontWeight:900,color:c,letterSpacing:"1px",fontFamily:"'Barlow Condensed',sans-serif",lineHeight:1}}>LEXIPOL</div>
        {size>=28&&<div style={{fontSize:size*.28,color:white?"rgba(255,255,255,.7)":BRAND.gray500,fontWeight:500,letterSpacing:".5px",lineHeight:1,marginTop:1}}>Retrospective Tool</div>}
      </div>
    </div>

}

// ─── BUTTON STYLES ────────────────────────────────────────────────────────────
const btn=(bg,color,extra={})=>({display:"inline-flex",alignItems:"center",gap:6,padding:"9px 20px",borderRadius:6,fontSize:13,fontWeight:700,cursor:"pointer",border:"none",transition:"all .15s",background:bg,color,letterSpacing:".3px",...extra});
const bPrimary=btn(BRAND.blue,BRAND.white,{boxShadow:`0 2px 8px rgba(30,95,168,.3)`});
const bGold=btn(BRAND.gold,BRAND.navy,{boxShadow:`0 2px 8px rgba(245,166,35,.3)`});
const bGhost=btn("transparent",BRAND.gray700,{border:`1.5px solid ${BRAND.gray200}`,"background":"#fff"});
const bDanger=btn("#fee2e2",BRAND.danger,{border:"1px solid #fca5a5"});
const FI={width:"100%",border:`1.5px solid ${BRAND.gray200}`,borderRadius:6,padding:"10px 14px",fontSize:14,color:BRAND.gray900,background:"#fff",marginBottom:12,outline:"none",transition:"border-color .15s",fontWeight:500};
const FL={fontSize:11,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",color:BRAND.gray500,display:"block",marginBottom:6};

// ─── AUTH / LOGIN ─────────────────────────────────────────────────────────────
function Auth({onLogin}){
  const [proj,setProj]=useState("");
  const [pw,setPw]=useState("");
  const [name,setName]=useState("");
  const [smName,setSmName]=useState("");
  const [err,setErr]=useState("");

  function go(){
    setErr("");
    if(pw===SM_PASSWORD){
      if(!smName){setErr("Please select your name.");return;}
      if(!proj){setErr("Please select a team.");return;}
      onLogin({project:proj,role:"sm",name:smName});return;
    }
    if(pw===PARTICIPANT_PASSWORD){
      if(!name.trim()){setErr("Please enter your name.");return;}
      if(!proj){setErr("Please select a team.");return;}
      onLogin({project:proj,role:"participant",name:name.trim()});return;
    }
    setErr("Incorrect access code. Please try again.");
  }

  const isSM=pw===SM_PASSWORD;

  return(
    <div style={{minHeight:"100vh",display:"flex",background:BRAND.navy}}>
      {/* Left panel — narrow brand strip */}
      <div style={{width:220,flexShrink:0,display:"flex",flexDirection:"column",
        justifyContent:"center",alignItems:"center",
        padding:"40px 24px",
        background:`linear-gradient(180deg, ${BRAND.navy} 0%, #0d2d5e 100%)`,
        borderRight:`1px solid rgba(255,255,255,.08)`}}>
        <LexipolLogo size={36} white/>
      </div>

      {/* Right panel — form, takes all remaining space */}
      <div style={{flex:1,display:"flex",flexDirection:"column",
        justifyContent:"center",padding:"48px 80px",background:"#fff",overflowY:"auto"}}>
        <div style={{marginBottom:32}}>
          <div style={{fontSize:24,fontWeight:800,color:BRAND.navy,marginBottom:6,
            fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:".5px"}}>
            SIGN IN TO YOUR SESSION
          </div>
          <div style={{fontSize:13,color:BRAND.gray500,fontWeight:500}}>
            Select your team and enter your access code
          </div>
        </div>

        {/* Team grid */}
        <label style={FL}>Select Team</label>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:7,marginBottom:16}}>
          {Object.entries(PROJECTS).map(([k,v])=>(
            <div key={k} onClick={()=>setProj(k)}
              style={{background:proj===k?BRAND.navy:"#f8fafc",
                border:`2px solid ${proj===k?BRAND.navy:BRAND.gray200}`,
                borderRadius:8,padding:"8px 4px",cursor:"pointer",
                textAlign:"center",transition:"all .15s"}}>
              <div style={{fontSize:20,marginBottom:3}}>{v.emoji}</div>
              <div style={{fontSize:10,fontWeight:700,
                color:proj===k?"#fff":BRAND.gray500,letterSpacing:".3px"}}>
                {v.name.toUpperCase()}
              </div>
            </div>
          ))}
        </div>

        {/* Access code */}
        <label style={FL}>Access Code</label>
        <input style={{...FI,letterSpacing:"3px",fontWeight:700}} type="password"
          placeholder="Enter code"
          value={pw} onChange={e=>setPw(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&go()}
          onFocus={e=>e.target.style.borderColor=BRAND.blue}
          onBlur={e=>e.target.style.borderColor=BRAND.gray200}/>

        {/* Name */}
        {isSM?(
          <>
            <label style={FL}>Scrum Master</label>
            <select style={{...FI,cursor:"pointer"}} value={smName} onChange={e=>setSmName(e.target.value)}
              onFocus={e=>e.target.style.borderColor=BRAND.blue}
              onBlur={e=>e.target.style.borderColor=BRAND.gray200}>
              <option value="">Select your name…</option>
              {SCRUM_MASTERS.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          </>
        ):(
          <>
            <label style={FL}>Your Name</label>
            <input style={FI} placeholder="e.g. Maria"
              value={name} onChange={e=>setName(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&go()}
              onFocus={e=>e.target.style.borderColor=BRAND.blue}
              onBlur={e=>e.target.style.borderColor=BRAND.gray200}/>
          </>
        )}

        {err&&(
          <div style={{background:"#fee2e2",color:BRAND.danger,borderRadius:6,
            padding:"10px 14px",fontSize:13,marginBottom:12,border:"1px solid #fca5a5",fontWeight:600}}>
            ⚠ {err}
          </div>
        )}

        <button style={{...bGold,width:"100%",justifyContent:"center",padding:"13px 0",
          fontSize:15,fontWeight:800,letterSpacing:".5px",marginTop:4}} onClick={go}>
          ENTER SESSION →
        </button>

        <div style={{marginTop:24,padding:"14px 16px",background:"#f8fafc",borderRadius:8,
          border:`1px solid ${BRAND.gray200}`,fontSize:12,color:BRAND.gray500,lineHeight:1.8}}>
          <div style={{fontWeight:700,color:BRAND.gray700,marginBottom:4}}>Access Codes</div>
          Participants: <strong style={{color:BRAND.navy}}>LEXIPOL</strong>
          &nbsp;&nbsp;·&nbsp;&nbsp;
          Scrum Masters: <strong style={{color:BRAND.navy}}>LEXIPOLSM</strong>
        </div>
      </div>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({user,onSelect}){
  return(
    <div style={{padding:"36px 32px",maxWidth:960,margin:"0 auto"}}>
      <div style={{marginBottom:28}}>
        <div style={{fontSize:13,color:BRAND.gray500,fontWeight:600,marginBottom:4,
          textTransform:"uppercase",letterSpacing:"1px"}}>Welcome back, {user.name}</div>
        <div style={{fontSize:26,fontWeight:800,color:BRAND.navy,fontFamily:"'Barlow Condensed',sans-serif",
          letterSpacing:".5px"}}>SELECT A TEAM</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:12}}>

// ─── RETRO LIST ───────────────────────────────────────────────────────────────
function RetroList({user,projectKey,onSelect,onBack}){
  const proj=PROJECTS[projectKey];
  const [retros,setRetros]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showCreate,setShowCreate]=useState(false);
  const [form,setForm]=useState({name:"",votes:3,columns:DEF_COLS.map(c=>({...c}))});

  useEffect(()=>{load();},[ ]);
  async function load(){
    setLoading(true);
    const {data}=await sb.from("retros").select("*").eq("project_key",projectKey).order("created_at",{ascending:false});
    setRetros(data||[]);setLoading(false);
  }
  async function create(){
    if(!form.name.trim())return;
    const r={id:uid(),project_key:projectKey,name:form.name.trim(),votes_per_person:parseInt(form.votes)||3,
      step:0,columns:form.columns,groups:[],action_items:{},ready_status:{},user_votes:{},group_votes:{},prev_action_statuses:{}};
    const {error}=await sb.from("retros").insert(r);
    if(!error){setShowCreate(false);onSelect(r.id);}
    else alert("Error: "+error.message);
  }
  function addCol(){setForm(f=>({...f,columns:[...f.columns,{id:uid(),label:"New Column",color:BRAND.blue}]}));}
  function removeCol(id){setForm(f=>({...f,columns:f.columns.filter(c=>c.id!==id)}));}
  function upCol(id,field,val){setForm(f=>({...f,columns:f.columns.map(c=>c.id===id?{...c,[field]:val}:c)}));}

  if(loading)return <PageLoader msg="Loading retros..."/>;

  const STEP_LABELS=["Review","Writing","Grouping","Voting","Action Items","Complete ✓"];
  const STEP_COLORS=[BRAND.blue,BRAND.gold,"#8b5cf6",BRAND.blue,BRAND.success,BRAND.success];

  return(
    <div style={{padding:"32px 28px",maxWidth:800,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:24}}>
        <div>
          <button style={{...bGhost,padding:"5px 12px",fontSize:12,marginBottom:12}} onClick={onBack}>← Back</button>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:28}}>{proj.emoji}</span>
            <div>
              <div style={{fontSize:22,fontWeight:800,color:BRAND.navy,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:".5px"}}>{proj.name.toUpperCase()}</div>
              <div style={{fontSize:13,color:BRAND.gray500}}>Retrospective history</div>
            </div>
          </div>
        </div>
        {user.role==="sm"&&<button style={bPrimary} onClick={()=>setShowCreate(true)}>+ New Retro</button>}
      </div>

      {retros.length===0&&(
        <div style={{background:"#fff",borderRadius:10,padding:32,textAlign:"center",border:`2px dashed ${BRAND.gray200}`}}>
          <div style={{fontSize:28,marginBottom:10}}>📋</div>
          <div style={{fontSize:14,color:BRAND.gray500,fontWeight:500}}>
            {user.role==="sm"?"No retros yet. Create one above.":"No retros yet. Ask your SM to create one."}
          </div>
        </div>
      )}

      {retros.map(r=>(
        <div key={r.id}
          style={{background:"#fff",border:`1.5px solid ${BRAND.gray200}`,borderRadius:10,
            padding:"16px 20px",marginBottom:10,display:"flex",alignItems:"center",
            justifyContent:"space-between",cursor:"pointer",transition:"all .15s"}}
          onClick={()=>onSelect(r.id)}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=BRAND.navy;e.currentTarget.style.boxShadow="0 2px 12px rgba(10,31,68,.1)";}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=BRAND.gray200;e.currentTarget.style.boxShadow="";}}>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:BRAND.navy}}>{r.name}</div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginTop:5}}>
              <span style={{fontSize:11,color:BRAND.gray500}}>
                {new Date(r.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}
              </span>
              <span style={{background:STEP_COLORS[r.step]+"18",color:STEP_COLORS[r.step],
                borderRadius:100,padding:"2px 9px",fontSize:11,fontWeight:700,
                border:`1px solid ${STEP_COLORS[r.step]}33`}}>
                {STEP_LABELS[r.step]}
              </span>
              <span style={{fontSize:11,color:BRAND.gray500}}>{r.votes_per_person} votes/person</span>
            </div>
          </div>
          <span style={{color:BRAND.gray300,fontSize:20}}>→</span>
        </div>
      ))}

      {showCreate&&(
        <div style={{position:"fixed",inset:0,background:"rgba(10,31,68,.5)",backdropFilter:"blur(4px)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#fff",borderRadius:12,padding:28,width:"100%",maxWidth:500,boxShadow:"0 24px 64px rgba(0,0,0,.2)",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{fontSize:18,fontWeight:800,color:BRAND.navy,marginBottom:20,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:".5px"}}>NEW RETROSPECTIVE</div>
            <label style={FL}>Sprint Name</label>
            <input style={FI} placeholder="e.g. Sprint 42 · March 2026" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} autoFocus
              onFocus={e=>e.target.style.borderColor=BRAND.blue} onBlur={e=>e.target.style.borderColor=BRAND.gray200}/>
            <label style={FL}>Votes per person</label>
            <input style={FI} type="number" min={1} max={20} value={form.votes} onChange={e=>setForm(f=>({...f,votes:e.target.value}))}
              onFocus={e=>e.target.style.borderColor=BRAND.blue} onBlur={e=>e.target.style.borderColor=BRAND.gray200}/>
            <label style={FL}>Columns</label>
            {form.columns.map(col=>(
              <div key={col.id} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                <input type="color" value={col.color} onChange={e=>upCol(col.id,"color",e.target.value)}
                  style={{width:32,height:32,border:"none",borderRadius:6,cursor:"pointer",padding:3,flexShrink:0}}/>
                <input style={{...FI,marginBottom:0,flex:1}} value={col.label} onChange={e=>upCol(col.id,"label",e.target.value)}
                  onFocus={e=>e.target.style.borderColor=BRAND.blue} onBlur={e=>e.target.style.borderColor=BRAND.gray200}/>
                {form.columns.length>1&&(
                  <button onClick={()=>removeCol(col.id)}
                    style={{background:"#fee2e2",color:BRAND.danger,border:"none",borderRadius:6,
                      width:32,height:32,cursor:"pointer",fontSize:16,flexShrink:0,display:"flex",
                      alignItems:"center",justifyContent:"center",fontWeight:700}}>×</button>
                )}
              </div>
            ))}
            <button onClick={addCol} style={{...bGhost,fontSize:12,padding:"6px 14px",marginBottom:16}}>+ Add column</button>
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <button style={bPrimary} onClick={create}>Create Retro</button>
              <button style={bGhost} onClick={()=>setShowCreate(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ADD PREV ITEM FORM ───────────────────────────────────────────────────────
function AddPrevItemForm({retro,saveRetro}){
  const [draft,setDraft]=useState("");
  async function add(){
    const t=draft.trim();if(!t)return;
    const item={id:uid(),text:t,topic:""};
    const next=[...(retro.prev_action_items||[]),item];
    await saveRetro({prev_action_items:next});
    setDraft("");
  }
  return(
    <div style={{background:"#f0f4f8",borderRadius:10,padding:"14px 16px",marginBottom:20,border:`1.5px solid ${BRAND.gray200}`}}>
      <div style={{fontSize:11,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",color:BRAND.gray500,marginBottom:10}}>Add Action Item from Last Sprint</div>
      <div style={{display:"flex",gap:8}}>
        <input style={{...FI,marginBottom:0,flex:1}}
          placeholder="e.g. Improve deployment pipeline documentation"
          value={draft} onChange={e=>setDraft(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();add();}}}
          onFocus={e=>e.target.style.borderColor=BRAND.blue}
          onBlur={e=>e.target.style.borderColor=BRAND.gray200}/>
        <button style={{...bPrimary,padding:"10px 18px",flexShrink:0}} onClick={add}>+ Add</button>
      </div>
    </div>
  );
}

// ─── BOARD ────────────────────────────────────────────────────────────────────
function Board({user,projectKey,retroId,onBack}){
  const [retro,setRetro]=useState(null);
  const [cards,setCards]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [aiLoading,setAiLoading]=useState(false);
  const [aiSug,setAiSug]=useState(null);
  const [drafts,setDrafts]=useState({});
  const [topicIdx,setTopicIdx]=useState(0);
  const [actDraft,setActDraft]=useState("");
  const [expanded,setExpanded]=useState({});
  const dragCard=useRef(null);
  const [dragOverCard,setDragOverCard]=useState(null);
  const [dragOverGroup,setDragOverGroup]=useState(null);

  useEffect(()=>{
    loadAll();
    const rs=sb.channel(`retro-${retroId}`)
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"retros",filter:`id=eq.${retroId}`},p=>{setRetro(p.new);}).subscribe();
    const cs=sb.channel(`cards-${retroId}`)
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"cards",filter:`retro_id=eq.${retroId}`},p=>{setCards(prev=>prev.find(c=>c.id===p.new.id)?prev:[...prev,p.new]);})
      .on("postgres_changes",{event:"DELETE",schema:"public",table:"cards",filter:`retro_id=eq.${retroId}`},p=>{setCards(prev=>prev.filter(c=>c.id!==p.old.id));}).subscribe();
    return()=>{sb.removeChannel(rs);sb.removeChannel(cs);};
  },[retroId]);

  async function loadAll(){
    setLoading(true);
    const [{data:rd},{data:cd}]=await Promise.all([
      sb.from("retros").select("*").eq("id",retroId).single(),
      sb.from("cards").select("*").eq("retro_id",retroId).order("created_at",{ascending:true}),
    ]);
    setRetro(rd||null);setCards(cd||[]);setLoading(false);
  }

  async function saveRetro(updates){
    setSaving(true);
    const {error}=await sb.from("retros").update(updates).eq("id",retroId);
    if(!error)setRetro(r=>({...r,...updates}));
    setSaving(false);
  }

  async function addCard(colId){
    const text=(drafts[colId]||"").trim();if(!text)return;
    setDrafts(d=>({...d,[colId]:""}));
    await sb.from("cards").insert({id:uid(),retro_id:retroId,col_id:colId,text,author:user.name});
  }

  async function toggleReady(){
    const rs={...(retro.ready_status||{})};rs[user.name]=!rs[user.name];
    await saveRetro({ready_status:rs});
  }

  // ── Drag ──
  function onDragStart(e,card){dragCard.current=card;e.dataTransfer.effectAllowed="move";}
  function onDragEnd(){dragCard.current=null;setDragOverCard(null);setDragOverGroup(null);}
  function onCardDragOver(e,tc){
    e.preventDefault();e.stopPropagation();
    if(!dragCard.current||dragCard.current.id===tc.id||dragCard.current.col_id!==tc.col_id)return;
    setDragOverCard(tc.id);setDragOverGroup(null);
  }
  function onGroupDragOver(e,gid){e.preventDefault();e.stopPropagation();if(!dragCard.current)return;setDragOverGroup(gid);setDragOverCard(null);}
  async function onCardDrop(e,tc){
    e.preventDefault();e.stopPropagation();setDragOverCard(null);setDragOverGroup(null);
    const src=dragCard.current;dragCard.current=null;
    if(!src||src.id===tc.id||src.col_id!==tc.col_id)return;
    let groups=[...(retro.groups||[])];
    const srcG=groups.find(g=>g.cardIds.includes(src.id));
    const tgtG=groups.find(g=>g.cardIds.includes(tc.id));
    if(srcG&&tgtG&&srcG.id===tgtG.id)return;
    if(tgtG){
      if(srcG)groups=groups.map(g=>g.id===srcG.id?{...g,cardIds:g.cardIds.filter(id=>id!==src.id)}:g);
      groups=groups.map(g=>g.id===tgtG.id?{...g,cardIds:[...g.cardIds,src.id]}:g);
    } else if(srcG){
      groups=groups.map(g=>g.id===srcG.id?{...g,cardIds:[...g.cardIds,tc.id]}:g);
    } else {
      const ng={id:uid(),name:"New Group",cardIds:[src.id,tc.id]};
      groups=[...groups,ng];setExpanded(ex=>({...ex,[ng.id]:true}));
    }
    await saveRetro({groups:groups.filter(g=>g.cardIds.length>0)});
  }
  async function onGroupDrop(e,gid){
    e.preventDefault();e.stopPropagation();setDragOverCard(null);setDragOverGroup(null);
    const src=dragCard.current;dragCard.current=null;if(!src)return;
    let groups=[...(retro.groups||[])];
    const srcG=groups.find(g=>g.cardIds.includes(src.id));
    if(srcG&&srcG.id===gid)return;
    if(srcG)groups=groups.map(g=>g.id===srcG.id?{...g,cardIds:g.cardIds.filter(id=>id!==src.id)}:g);
    groups=groups.map(g=>g.id===gid?{...g,cardIds:[...g.cardIds,src.id]}:g);
    await saveRetro({groups:groups.filter(g=>g.cardIds.length>0)});
  }
  async function ungroupCard(cardId){
    await saveRetro({groups:(retro.groups||[]).map(g=>({...g,cardIds:g.cardIds.filter(id=>id!==cardId)})).filter(g=>g.cardIds.length>0)});
  }

  // ── AI ──
  async function runGrouping(){
    setAiLoading(true);await saveRetro({step:2,ready_status:{}});
    const cs=cards.map(c=>({id:c.id,text:c.text}));
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"You are an agile coach. Return ONLY valid JSON.",
          messages:[{role:"user",content:`Group these retro cards into 3-6 thematic clusters.\nCards:${JSON.stringify(cs)}\nReturn ONLY JSON:{"groups":[{"name":"Group Name","cardIds":["id1"]}]}`}]})});
      const d=await res.json();
      const p=JSON.parse((d.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim());
      setAiSug(p.groups||[]);
    }catch{setAiSug([]);}
    setAiLoading(false);
  }
  async function acceptGroups(){
    const groups=aiSug.map(g=>({...g,id:uid()}));
    const ex={};groups.forEach(g=>{ex[g.id]=true;});setExpanded(ex);
    await saveRetro({groups});setAiSug(null);
  }

  // ── Vote ──
  const vUsed=()=>Object.values((retro?.user_votes||{})[user.name]||{}).reduce((a,b)=>a+b,0);
  const vLeft=()=>(retro?.votes_per_person||3)-vUsed();
  async function voteItem(id,delta){
    const vl=vLeft();const uv={...(retro.user_votes||{})};const myV={...(uv[user.name]||{})};
    const cur=myV[id]||0;if(delta>0&&vl<=0)return;
    myV[id]=Math.max(0,cur+delta);uv[user.name]=myV;
    const gv={...(retro.group_votes||{})};gv[id]=Object.values(uv).reduce((s,mv)=>s+(mv[id]||0),0);
    await saveRetro({user_votes:uv,group_votes:gv});
  }

  // ── Topics ──
  const allTopics=()=>{
    if(!retro)return[];
    const gv=retro.group_votes||{};
    const grouped=new Set((retro.groups||[]).flatMap(g=>g.cardIds));
    const items=[];
    (retro.groups||[]).forEach(g=>{items.push({type:"group",id:g.id,name:g.name,votes:gv[g.id]||0,cards:cards.filter(c=>g.cardIds.includes(c.id))});});
    cards.filter(c=>!grouped.has(c.id)).forEach(c=>{items.push({type:"card",id:c.id,name:c.text,votes:gv[c.id]||0,cards:[c]});});
    return items.sort((a,b)=>b.votes-a.votes);
  };
  async function addAction(){
    if(!actDraft.trim())return;
    const topics=allTopics();const t=topics[topicIdx];if(!t)return;
    const ai2={...(retro.action_items||{})};
    ai2[t.id]=[...(ai2[t.id]||[]),{id:uid(),text:actDraft.trim()}];
    await saveRetro({action_items:ai2});setActDraft("");
  }
  async function removeAction(tid,itemId){
    const ai2={...(retro.action_items||{})};
    ai2[tid]=(ai2[tid]||[]).filter(x=>x.id!==itemId);
    await saveRetro({action_items:ai2});
  }
  async function advance(){
    if(!retro||retro.step>=5)return;
    if(retro.step===0){await saveRetro({step:1,ready_status:{}});return;}
    if(retro.step===1){await runGrouping();return;}
    await saveRetro({step:retro.step+1,ready_status:{}});
  }
  async function goBack(){if(!retro||retro.step<=0)return;await saveRetro({step:retro.step-1,ready_status:{}});}

  if(loading)return <PageLoader msg="Loading session..."/>;
  if(!retro)return <div style={{padding:40,color:BRAND.gray500}}>Session not found.</div>;

  const readyNames=Object.entries(retro.ready_status||{}).filter(([,v])=>v).map(([k])=>k);
  const isReady=!!retro.ready_status?.[user.name];
  const vl=vLeft();
  const knownPeople=Array.from(new Set([user.name,...cards.map(c=>c.author)]));
  const colColor=colId=>(retro.columns.find(c=>c.id===colId)||{color:BRAND.gray300}).color;
  const proj=PROJECTS[projectKey];

  // ── VoteBtn ──
  const VoteBtn=({id})=>{
    const myV=((retro.user_votes||{})[user.name]||{})[id]||0;
    const totV=retro.group_votes?.[id]||0;
    const canUp=vl>0,canDown=myV>0;
    return(
      <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
        <div style={{background:BRAND.gray100,borderRadius:6,padding:"3px 8px",
          fontSize:13,fontWeight:800,color:BRAND.navy,minWidth:28,textAlign:"center"}}>
          {totV}
        </div>
        <button onClick={()=>voteItem(id,1)} disabled={!canUp}
          style={{background:canUp?"#dcfce7":"#f1f5f9",border:"none",borderRadius:6,
            width:32,height:32,cursor:canUp?"pointer":"not-allowed",fontSize:17,
            display:"flex",alignItems:"center",justifyContent:"center",
            opacity:canUp?1:.35,transition:"all .12s"}}>👍</button>
        <button onClick={()=>voteItem(id,-1)} disabled={!canDown}
          style={{background:canDown?"#fee2e2":"#f1f5f9",border:"none",borderRadius:6,
            width:32,height:32,cursor:canDown?"pointer":"not-allowed",fontSize:17,
            display:"flex",alignItems:"center",justifyContent:"center",
            opacity:canDown?1:.35,transition:"all .12s"}}>👎</button>
      </div>
    );
  };

  // ── Card Step1 ──
  const Card1=({card,col})=>{
    const isMe=card.author===user.name;
    const revealed=retro.step>=2;
    const show=isMe||revealed;
    return(
      <div style={{background:"#fff",border:`1.5px solid ${BRAND.gray200}`,borderRadius:8,
        padding:"11px 14px",display:"flex",alignItems:"center",gap:10,
        boxShadow:"0 1px 4px rgba(0,0,0,.04)",marginBottom:7,animation:"fadeIn .2s ease",
        transition:"box-shadow .15s"}}
        onMouseEnter={e=>e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,.08)"}
        onMouseLeave={e=>e.currentTarget.style.boxShadow="0 1px 4px rgba(0,0,0,.04)"}>
        <div style={{width:4,borderRadius:4,background:col.color,alignSelf:"stretch",minHeight:32,flexShrink:0}}/>
        <div style={{width:30,height:30,borderRadius:"50%",background:show?AV[hsh(card.author)%AV.length].bg:"#f1f5f9",
          color:show?AV[hsh(card.author)%AV.length].t:"#94a3b8",display:"flex",alignItems:"center",
          justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0,border:"2px solid #fff",
          boxShadow:"0 1px 3px rgba(0,0,0,.1)",filter:show?"none":"blur(4px)"}}>
          {show?ini(card.author):"?"}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,color:show?BRAND.navy:BRAND.navy,
            filter:show?"none":"blur(6px)",userSelect:show?"auto":"none",
            lineHeight:1.5,transition:"filter .5s ease"}}>
            {card.text}
          </div>
          {show&&(
            <div style={{fontSize:11,color:BRAND.gray500,marginTop:3,display:"flex",alignItems:"center",gap:5}}>
              {isMe&&<span style={{background:BRAND.navy,color:"#fff",borderRadius:4,padding:"1px 6px",fontSize:10,fontWeight:700}}>You</span>}
              {card.author}
            </div>
          )}
        </div>
      </div>
    );
  };

  // ── Card Step2 ──
  const Card2=({card,inGroup=false})=>{
    const isOver=dragOverCard===card.id;
    return(
      <div draggable onDragStart={e=>onDragStart(e,card)} onDragEnd={onDragEnd}
        onDragOver={e=>onCardDragOver(e,card)} onDrop={e=>onCardDrop(e,card)}
        style={{background:isOver?"#eff6ff":"#fff",border:`1.5px solid ${isOver?BRAND.blue:BRAND.gray200}`,
          borderRadius:8,padding:"9px 12px",display:"flex",alignItems:"center",gap:8,
          boxShadow:isOver?`0 0 0 3px rgba(30,95,168,.15)`:"0 1px 3px rgba(0,0,0,.04)",
          marginBottom:6,cursor:"grab",transition:"all .12s",animation:"fadeIn .18s ease"}}>
        <span style={{color:BRAND.gray300,fontSize:13,flexShrink:0}}>⠿</span>
        <div style={{width:3,borderRadius:3,background:colColor(card.col_id),alignSelf:"stretch",minHeight:22,flexShrink:0}}/>
        <Av name={card.author} size={20}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,color:BRAND.navy,lineHeight:1.4}}>{card.text}</div>
          <div style={{fontSize:11,color:BRAND.gray500,marginTop:1}}>{card.author}</div>
        </div>
        {inGroup&&<button onClick={()=>ungroupCard(card.id)}
          style={{background:"none",border:"none",cursor:"pointer",color:BRAND.gray300,fontSize:15,padding:"0 2px"}}
          onMouseEnter={e=>e.target.style.color=BRAND.danger}
          onMouseLeave={e=>e.target.style.color=BRAND.gray300}>×</button>}
      </div>
    );
  };

  // ── Summary ──
  const Summary=()=>{
    const topics=allTopics();
    const allActions=[];
    topics.forEach(t=>{((retro.action_items||{})[t.id]||[]).forEach(item=>{allActions.push({...item,topic:t});});});
    return(
      <div style={{padding:"32px 28px",maxWidth:860,margin:"0 auto",overflowY:"auto",height:"calc(100vh - 160px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:28}}>
          <div style={{width:52,height:52,borderRadius:12,background:BRAND.navy,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>🎉</div>
          <div>
            <div style={{fontSize:24,fontWeight:800,color:BRAND.navy,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:".5px"}}>RETRO COMPLETE</div>
            <div style={{fontSize:13,color:BRAND.gray500,marginTop:2}}>{retro.name}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:12,marginBottom:28}}>
          {[{label:"Action Items",value:allActions.length,color:BRAND.blue,bg:"#dbeafe"},
            {label:"Topics Covered",value:topics.filter(t=>((retro.action_items||{})[t.id]||[]).length>0).length,color:BRAND.success,bg:"#dcfce7"},
            {label:"Total Votes",value:Object.values(retro.group_votes||{}).reduce((a,b)=>a+b,0),color:"#7c3aed",bg:"#ede9fe"},
            {label:"Participants",value:knownPeople.length,color:BRAND.gold,bg:"#fef3c7"}].map(s=>(
            <div key={s.label} style={{flex:1,background:s.bg,borderRadius:10,padding:"16px",textAlign:"center"}}>
              <div style={{fontSize:30,fontWeight:900,color:s.color,fontFamily:"'Barlow Condensed',sans-serif"}}>{s.value}</div>
              <div style={{fontSize:10,color:s.color,marginTop:4,fontWeight:700,letterSpacing:"1px",opacity:.8}}>{s.label.toUpperCase()}</div>
            </div>
          ))}
        </div>
        {allActions.length===0?(
          <div style={{background:"#f8fafc",borderRadius:10,padding:32,textAlign:"center",border:`2px dashed ${BRAND.gray200}`}}>
            <div style={{fontSize:28,marginBottom:8}}>📋</div>
            <div style={{fontSize:14,color:BRAND.gray500}}>No action items were created.</div>
          </div>
        ):(
          <>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",color:BRAND.gray500,marginBottom:14}}>
              Action Items — {allActions.length} total
            </div>
            {allActions.map((action,i)=>{
              const t=action.topic;const fc=t.cards[0];
              return(
                <div key={action.id} style={{background:"#fff",border:`1.5px solid ${BRAND.gray200}`,borderRadius:10,padding:"16px 20px",marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,.05)",animation:"fadeIn .2s ease"}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:14}}>
                    <div style={{background:BRAND.navy,color:"#fff",borderRadius:8,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,flexShrink:0}}>{i+1}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15,fontWeight:700,color:BRAND.navy,marginBottom:10}}>{action.text}</div>
                      <div style={{background:BRAND.gray50,borderRadius:8,padding:"10px 12px",display:"flex",alignItems:"center",gap:10,border:`1px solid ${BRAND.gray100}`}}>
                        <div style={{width:3,borderRadius:3,background:fc?colColor(fc.col_id):BRAND.gray300,alignSelf:"stretch",minHeight:24,flexShrink:0}}/>
                        {fc&&<Av name={fc.author} size={22}/>}
                        <div style={{flex:1}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                            <span style={{fontSize:10,fontWeight:700,color:BRAND.gray500,textTransform:"uppercase",letterSpacing:"1px"}}>{t.type==="group"?"Group":"Ticket"}</span>
                            <span style={{background:"#dcfce7",color:BRAND.success,borderRadius:100,padding:"1px 8px",fontSize:11,fontWeight:700}}>👍 {t.votes} vote{t.votes!==1?"s":""}</span>
                          </div>
                          <div style={{fontSize:13,color:BRAND.gray700,fontWeight:600}}>{t.name}</div>
                          {t.type==="group"&&t.cards.length>1&&(
                            <div style={{display:"flex",gap:5,marginTop:7,flexWrap:"wrap"}}>
                              {t.cards.map(c=>(
                                <div key={c.id} style={{display:"flex",alignItems:"center",gap:4,background:"#fff",border:`1px solid ${BRAND.gray200}`,borderRadius:6,padding:"2px 8px",fontSize:11}}>
                                  <Av name={c.author} size={14}/><span style={{color:BRAND.gray500}}>{c.text.slice(0,30)}{c.text.length>30?"…":""}</span>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </>
        )}
      </div>
    );
  };

  // ─────────────────────────────────────────────────────────────────────────────
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>

      {/* Topbar */}
      <div style={{background:BRAND.navy,height:52,display:"flex",alignItems:"center",
        padding:"0 20px",gap:12,flexShrink:0}}>
        <button style={{...bGhost,padding:"4px 10px",fontSize:11,
          background:"rgba(255,255,255,.1)",color:"#fff",border:"1px solid rgba(255,255,255,.15)"}}
          onClick={onBack}>← Back</button>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:15}}>{proj.emoji}</span>
          <span style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,.9)",
            fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:".5px"}}>{proj.name.toUpperCase()}</span>
          <span style={{color:"rgba(255,255,255,.3)"}}>·</span>
          <span style={{fontSize:12,color:"rgba(255,255,255,.6)",overflow:"hidden",
            textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{retro.name}</span>
        </div>
        {saving&&<span style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>saving…</span>}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
          {user.role==="sm"&&<span style={{background:BRAND.gold,color:BRAND.navy,borderRadius:100,padding:"2px 10px",fontSize:11,fontWeight:800}}>SM</span>}
          <Av name={user.name} size={28}/>
          <span style={{fontSize:12,fontWeight:600,color:"#fff"}}>{user.name}</span>
        </div>
      </div>

      {/* Color bar */}
      <div style={{display:"flex",height:3,flexShrink:0}}>
        {retro.columns.map(c=><div key={c.id} style={{flex:1,background:c.color}}/>)}
      </div>

      {/* Step bar */}
      <div style={{background:"#fff",borderBottom:`1px solid ${BRAND.gray200}`,height:48,
        display:"flex",alignItems:"center",padding:"0 20px",gap:16,flexShrink:0,
        boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,flex:1,flexWrap:"wrap"}}>
          {["Review","Write","Group","Vote","Actions"].map((label,i)=>{
            const s=i;const active=retro.step===s;const done=retro.step>s;
            return(
              <div key={s} style={{display:"flex",alignItems:"center",gap:5}}>
                {i>0&&<span style={{color:BRAND.gray300,fontSize:11}}>›</span>}
                <div style={{display:"flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:100,
                  background:active?BRAND.navy:done?"#dcfce7":"#f8fafc",
                  border:`1px solid ${active?BRAND.navy:done?BRAND.success:BRAND.gray200}`}}>
                  <span style={{fontSize:11,fontWeight:700,letterSpacing:".3px",
                    color:active?"#fff":done?BRAND.success:BRAND.gray500}}>
                    {done?"✓ ":""}{label.toUpperCase()}
                  </span>
                </div>
              </div>
            );
          })}
          {retro.step===3&&(
            <span style={{background:"#fee2e2",color:BRAND.danger,borderRadius:100,
              padding:"3px 10px",fontSize:11,fontWeight:700,marginLeft:4}}>
              {vl} vote{vl!==1?"s":""} left
            </span>
          )}
        </div>

            const total=prevItems.length;

                                  const next=(retro.prev_action_items||[]).filter(x=>x.id!==item.id);

                                }} style={{padding:"5px 10px",borderRadius:100,fontSize:12,fontWeight:700,cursor:"pointer",
                                  border:`1.5px solid #fca5a5`,background:"#fee2e2",color:BRAND.danger,transition:"all .15s",marginLeft:"auto"}}>

                      {colGroups.map(g=>{
                        const gc=cards.filter(c=>g.cardIds.includes(c.id)&&c.col_id===col.id);

                          <div key={g.id}

                              </div>

                          </div>

                      })}
                    </div>
                  </div>
                );
              })}
            </div>

          {/* ── STEP 4: Action Items ── */}

            const topics=allTopics();
            if(topics.length===0)return(
              <div style={{padding:48,textAlign:"center",color:BRAND.gray500}}>
                <div style={{fontSize:36,marginBottom:12}}>🗳️</div>
                <div style={{fontSize:15,fontWeight:600}}>No cards found.</div>
              </div>
            );
            const tIdx=Math.min(topicIdx,topics.length-1);

              <div style={{display:"flex",height:"100%"}}>

                      </div>

                        {tIdx+1} of {topics.length}

                  </div>

                  {/* Topic context */}
                  <div style={{background:BRAND.gray50,border:`1.5px solid ${BRAND.gray200}`,borderRadius:9,padding:"10px 16px",marginBottom:22,width:"100%",maxWidth:540,display:"flex",alignItems:"center",gap:10}}>
                    {fc&&<><div style={{width:3,borderRadius:3,background:colColor(fc.col_id),alignSelf:"stretch",minHeight:20,flexShrink:0}}/><Av name={fc.author} size={24}/></>}
                    <div style={{flex:1}}>
                      <div style={{fontSize:10,color:BRAND.gray500,fontWeight:700,marginBottom:2,textTransform:"uppercase",letterSpacing:"1px"}}>Current Topic · 👍 {t.votes} votes</div>
                      <div style={{fontSize:13,fontWeight:700,color:BRAND.navy}}>{t.name}</div>
                    </div>
                  </div>

                  <input style={{width:"100%",maxWidth:540,border:"none",borderBottom:`2px solid ${BRAND.gray200}`,padding:"10px 0",fontSize:14,color:BRAND.navy,background:"transparent",outline:"none",fontWeight:500}}
                    placeholder="+ Type your idea here and hit enter"
                    value={actDraft} onChange={e=>setActDraft(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addAction();}}}
                    onFocus={e=>e.target.style.borderBottomColor=BRAND.blue}
                    onBlur={e=>e.target.style.borderBottomColor=BRAND.gray200}/>

                  {items.map(item=>(
                    <div key={item.id} style={{width:"100%",maxWidth:540,background:"#fff",border:`1.5px solid ${BRAND.gray200}`,borderRadius:8,padding:"11px 16px",marginTop:10,display:"flex",alignItems:"flex-start",gap:10,boxShadow:"0 1px 4px rgba(0,0,0,.05)",animation:"fadeIn .2s ease"}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:600,color:BRAND.navy,marginBottom:4}}>{item.text}</div>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          {fc&&<Av name={fc.author} size={16}/>}
                          <span style={{fontSize:11,color:BRAND.gray500}}>from: {t.name.slice(0,40)}{t.name.length>40?"…":""} · 👍{t.votes}</span>
                        </div>
                      </div>
                      <button style={{background:"none",border:"none",cursor:"pointer",color:BRAND.gray300,fontSize:17,padding:"0 4px",lineHeight:1}}
                        onClick={()=>removeAction(t.id,item.id)}
                        onMouseEnter={e=>e.target.style.color=BRAND.danger}
                        onMouseLeave={e=>e.target.style.color=BRAND.gray300}>×</button>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}

          {/* ── STEP 5 ── */}
          {retro.step===5&&<Summary/>}
        </div>

        {/* Sidebar */}
        {retro.step<5&&(
          <div style={{width:190,flexShrink:0,background:"#fff",borderLeft:`1px solid ${BRAND.gray200}`,padding:"18px 16px",overflowY:"auto"}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",color:BRAND.gray500,marginBottom:14}}>Members Ready</div>
            {knownPeople.map(name=>(
              <div key={name} style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <div style={{position:"relative"}}>
                  <Av name={name} size={30}/>
                  {readyNames.includes(name)&&(
                    <div style={{position:"absolute",bottom:-2,right:-2,width:12,height:12,borderRadius:"50%",background:BRAND.success,border:"2px solid #fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:"#fff"}}>✓</div>
                  )}
                </div>
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:BRAND.navy}}>{name}{name===user.name?" (you)":""}</div>
                  <div style={{fontSize:10,color:readyNames.includes(name)?BRAND.success:BRAND.gray500,fontWeight:600}}>
                    {readyNames.includes(name)?"✓ Ready":"Thinking…"}
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [view,setView]=useState("dashboard");
  const [selProject,setSelProject]=useState(null);
  const [selRetro,setSelRetro]=useState(null);

  if(!user)return <Auth onLogin={u=>{setUser(u);setSelProject(u.project);setView("retrolist");}}/>;

  const proj=PROJECTS[selProject];

  const Topbar=()=>(
    <div style={{background:BRAND.navy,height:52,display:"flex",alignItems:"center",padding:"0 24px",gap:12}}>
      <LexipolLogo size={32} white/>
      {selProject&&(
        <span style={{background:"rgba(255,255,255,.1)",color:"rgba(255,255,255,.8)",border:"1px solid rgba(255,255,255,.15)",borderRadius:100,padding:"2px 10px",fontSize:11,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:".5px"}}>
          {proj.emoji} {proj.name.toUpperCase()}
        </span>
      )}
      <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
        {/* Health Dashboard tab — SM only */}
        {user.role==="sm"&&selProject&&(
          <button
            onClick={()=>setView(view==="health"?"retrolist":"health")}
            style={{...bGhost,padding:"5px 14px",fontSize:12,
              background:view==="health"?BRAND.gold:"rgba(255,255,255,.1)",
              color:view==="health"?BRAND.navy:"#fff",
              border:view==="health"?`1px solid ${BRAND.gold}`:"1px solid rgba(255,255,255,.15)"}}>
            📊 Health Dashboard
          </button>
        )}
        <Av name={user.name} size={28}/>
        <span style={{fontSize:12,fontWeight:600,color:"#fff"}}>{user.name}</span>
        <button style={{...bGhost,padding:"5px 12px",fontSize:12,background:"rgba(255,255,255,.1)",color:"#fff",border:"1px solid rgba(255,255,255,.15)"}} onClick={()=>setUser(null)}>Logout</button>
      </div>
    </div>
  );

  if(view==="board"&&selRetro)return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <Board user={user} projectKey={selProject} retroId={selRetro} onBack={()=>setView("retrolist")}/>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:BRAND.gray100}}>
      <Topbar/>
      {view==="dashboard"&&<Dashboard user={user} onSelect={k=>{setSelProject(k);setView("retrolist");}}/>}
      {view==="retrolist"&&<RetroList user={user} projectKey={selProject} onSelect={id=>{setSelRetro(id);setView("board");}} onBack={()=>setView("dashboard")}/>}
      {view==="health"&&user.role==="sm"&&<HealthDashboard user={user} projectKey={selProject} onBack={()=>setView("retrolist")}/>}
    </div>
  );
}

// ─── HEALTH DASHBOARD ─────────────────────────────────────────────────────────
function HealthDashboard({user,projectKey,onBack}){
  const [retros,setRetros]=useState([]);
  const [loading,setLoading]=useState(true);
  const proj=PROJECTS[projectKey];

  useEffect(()=>{
    async function load(){
      setLoading(true);
      const {data}=await sb.from("retros").select("*").eq("project_key",projectKey).order("created_at",{ascending:true});
      setRetros((data||[]).filter(r=>r.step===5));
      setLoading(false);
    }
    load();
  },[projectKey]);

  if(loading)return <PageLoader msg="Loading health data..."/>;

  // Build per-sprint health metrics
  const sprints=retros.map(r=>{
    const ai=r.action_items||{};
    const totalActions=Object.values(ai).reduce((s,a)=>s+a.length,0);
    const statuses=r.prev_action_statuses||{};
    const prevItems=r.prev_action_items||[];
    const prevTotal=prevItems.length;
    const prevDone=prevItems.filter(it=>statuses[it.id]==="done").length;
    const prevProg=prevItems.filter(it=>statuses[it.id]==="progress").length;
    const prevNot=prevItems.filter(it=>statuses[it.id]==="not_done").length;
    const gv=r.group_votes||{};
    const totalVotes=Object.values(gv).reduce((a,b)=>a+b,0);
    const wentWell=Object.values(r.columns||[]).filter(c=>c.id==="went-well").length;
    // Health score: % of prev action items done + participation proxy
    const completionRate=prevTotal>0?Math.round((prevDone/prevTotal)*100):null;
    return{id:r.id,name:r.name,date:r.created_at,totalActions,prevTotal,prevDone,prevProg,prevNot,completionRate,totalVotes};
  });

  const avg=arr=>arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):0;
  const withCompletion=sprints.filter(s=>s.completionRate!==null);
  const avgCompletion=withCompletion.length?avg(withCompletion.map(s=>s.completionRate)):null;
  const avgActions=avg(sprints.map(s=>s.totalActions));

  const barMax=Math.max(...sprints.map(s=>s.totalActions),1);

  return(
    <div style={{padding:"32px 28px",maxWidth:960,margin:"0 auto",overflowY:"auto",minHeight:"calc(100vh - 52px)"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:28}}>
        <div>
          <button style={{...bGhost,padding:"5px 12px",fontSize:12,marginBottom:12}} onClick={onBack}>← Back</button>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:52,height:52,borderRadius:12,background:BRAND.navy,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>📊</div>
            <div>
              <div style={{fontSize:24,fontWeight:800,color:BRAND.navy,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:".5px"}}>TEAM HEALTH DASHBOARD</div>
              <div style={{fontSize:13,color:BRAND.gray500,marginTop:2}}>{proj.emoji} {proj.name} · SM only view</div>
            </div>
          </div>
        </div>
        <div style={{background:BRAND.gold+"22",border:`1.5px solid ${BRAND.gold}`,borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:700,color:BRAND.navy,display:"flex",alignItems:"center",gap:6}}>
          🔒 Scrum Master Eyes Only
        </div>
      </div>

      {sprints.length===0?(
        <div style={{background:"#fff",borderRadius:12,padding:48,textAlign:"center",border:`2px dashed ${BRAND.gray200}`}}>
          <div style={{fontSize:36,marginBottom:12}}>📭</div>
          <div style={{fontSize:15,color:BRAND.gray500,fontWeight:500}}>No completed sprints yet. Health data will appear here once retros are finished.</div>
        </div>
      ):(
        <>
          {/* Summary cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:28}}>
            {[
              {label:"Sprints Tracked",value:sprints.length,icon:"📅",color:BRAND.blue,bg:"#dbeafe"},
              {label:"Avg Action Items",value:avgActions,icon:"✅",color:BRAND.success,bg:"#dcfce7"},
              {label:"Avg Completion Rate",value:avgCompletion!==null?`${avgCompletion}%`:"—",icon:"🎯",color:"#7c3aed",bg:"#ede9fe"},
              {label:"Latest Sprint",value:sprints[sprints.length-1]?.name?.split("·")[0]?.trim()||"—",icon:"🏁",color:BRAND.gold,bg:"#fef3c7",small:true},
            ].map(s=>(
              <div key={s.label} style={{background:s.bg,borderRadius:12,padding:"18px 20px"}}>
                <div style={{fontSize:22,marginBottom:6}}>{s.icon}</div>
                <div style={{fontSize:s.small?16:28,fontWeight:900,color:s.color,fontFamily:"'Barlow Condensed',sans-serif",lineHeight:1.1}}>{s.value}</div>
                <div style={{fontSize:10,color:s.color,marginTop:5,fontWeight:700,letterSpacing:"1px",opacity:.8}}>{s.label.toUpperCase()}</div>
              </div>
            ))}
          </div>

          {/* Action items bar chart */}
          <div style={{background:"#fff",borderRadius:12,padding:"24px 28px",marginBottom:20,boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:`1px solid ${BRAND.gray200}`}}>
            <div style={{fontSize:13,fontWeight:700,color:BRAND.navy,marginBottom:20,textTransform:"uppercase",letterSpacing:"1px"}}>📈 Action Items per Sprint</div>
            <div style={{display:"flex",gap:12,alignItems:"flex-end",minHeight:120}}>
              {sprints.map(s=>{
                const h=Math.max(12,Math.round((s.totalActions/barMax)*100));
                return(
                  <div key={s.id} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                    <div style={{fontSize:12,fontWeight:800,color:BRAND.blue}}>{s.totalActions}</div>
                    <div style={{width:"100%",maxWidth:48,height:h,background:`linear-gradient(180deg,${BRAND.blue},${BRAND.blueLight})`,borderRadius:"5px 5px 0 0",transition:"height .3s",minHeight:12}}/>
                    <div style={{fontSize:9,color:BRAND.gray500,textAlign:"center",fontWeight:600,maxWidth:60,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name.split("·")[0].trim()}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Action item completion rate */}
          {withCompletion.length>0&&(
            <div style={{background:"#fff",borderRadius:12,padding:"24px 28px",marginBottom:20,boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:`1px solid ${BRAND.gray200}`}}>
              <div style={{fontSize:13,fontWeight:700,color:BRAND.navy,marginBottom:20,textTransform:"uppercase",letterSpacing:"1px"}}>🎯 Previous Action Item Completion</div>
              {withCompletion.map(s=>(
                <div key={s.id} style={{marginBottom:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <div style={{fontSize:13,fontWeight:600,color:BRAND.gray700}}>{s.name}</div>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      {[{label:"✅",v:s.prevDone,c:BRAND.success},{label:"🔄",v:s.prevProg,c:"#d97706"},{label:"❌",v:s.prevNot,c:BRAND.danger}].map(x=>(
                        <span key={x.label} style={{fontSize:12,fontWeight:700,color:x.c}}>{x.label} {x.v}</span>
                      ))}
                      <span style={{fontSize:12,fontWeight:800,color:s.completionRate>=70?BRAND.success:s.completionRate>=40?"#d97706":BRAND.danger,
                        background:s.completionRate>=70?"#dcfce7":s.completionRate>=40?"#fef3c7":"#fee2e2",
                        borderRadius:100,padding:"2px 10px"}}>{s.completionRate}%</span>
                    </div>
                  </div>
                  <div style={{height:10,borderRadius:10,background:BRAND.gray100,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:10,width:`${s.completionRate}%`,
                      background:s.completionRate>=70?BRAND.success:s.completionRate>=40?"#f59e0b":BRAND.danger,
                      transition:"width .5s ease"}}/>
                  </div>
                  <div style={{display:"flex",gap:4,marginTop:5,flexWrap:"wrap"}}>
                    {(retros.find(r=>r.id===s.id)?.prev_action_items||[]).map(item=>{
                      const st=(retros.find(r=>r.id===s.id)?.prev_action_statuses||{})[item.id];
                      const stopt=[
                        {key:"done",emoji:"✅",c:BRAND.success,bg:"#dcfce7"},
                        {key:"progress",emoji:"🔄",c:"#92400e",bg:"#fef3c7"},
                        {key:"not_done",emoji:"❌",c:BRAND.danger,bg:"#fee2e2"},
                      ].find(x=>x.key===st)||{emoji:"❓",c:BRAND.gray500,bg:BRAND.gray100};
                      return(
                        <span key={item.id} style={{fontSize:11,background:stopt.bg,color:stopt.c,borderRadius:6,padding:"2px 8px",fontWeight:600,border:`1px solid ${stopt.c}22`}}>
                          {stopt.emoji} {item.text.slice(0,40)}{item.text.length>40?"…":""}
                        </span>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Sprint history table */}
          <div style={{background:"#fff",borderRadius:12,padding:"24px 28px",boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:`1px solid ${BRAND.gray200}`}}>
            <div style={{fontSize:13,fontWeight:700,color:BRAND.navy,marginBottom:16,textTransform:"uppercase",letterSpacing:"1px"}}>🗂 Sprint History</div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr style={{borderBottom:`2px solid ${BRAND.gray200}`}}>
                    {["Sprint","Date","Action Items","Prev Completed","Prev In Progress","Prev Not Done","Completion %"].map(h=>(
                      <th key={h} style={{textAlign:"left",padding:"8px 12px",fontSize:10,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",color:BRAND.gray500}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[...sprints].reverse().map((s,i)=>(
                    <tr key={s.id} style={{borderBottom:`1px solid ${BRAND.gray100}`,background:i%2===0?"#f8fafc":"#fff"}}>
                      <td style={{padding:"10px 12px",fontWeight:700,color:BRAND.navy}}>{s.name}</td>
                      <td style={{padding:"10px 12px",color:BRAND.gray500}}>{new Date(s.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</td>
                      <td style={{padding:"10px 12px",fontWeight:800,color:BRAND.blue}}>{s.totalActions}</td>
                      <td style={{padding:"10px 12px",fontWeight:700,color:BRAND.success}}>{s.prevDone}</td>
                      <td style={{padding:"10px 12px",fontWeight:700,color:"#d97706"}}>{s.prevProg}</td>
                      <td style={{padding:"10px 12px",fontWeight:700,color:BRAND.danger}}>{s.prevNot}</td>
                      <td style={{padding:"10px 12px"}}>
                        {s.completionRate!==null?(
                          <span style={{fontWeight:800,
                            color:s.completionRate>=70?BRAND.success:s.completionRate>=40?"#d97706":BRAND.danger,
                            background:s.completionRate>=70?"#dcfce7":s.completionRate>=40?"#fef3c7":"#fee2e2",
                            borderRadius:100,padding:"3px 12px"}}>
                            {s.completionRate}%
                          </span>
                        ):<span style={{color:BRAND.gray300,fontSize:12}}>—</span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
